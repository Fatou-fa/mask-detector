<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Détecteur de Masque Facial</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
    }
    h1 {
      text-align: center;
      color: #1a1a2e;
      font-size: 22px;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    .upload-zone {
      border: 2px dashed #c0c8d8;
      border-radius: 12px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }
    .upload-zone:hover { border-color: #0070c0; }
    .upload-zone input { display: none; }
    .upload-icon { font-size: 40px; margin-bottom: 10px; }
    .upload-zone p { color: #666; font-size: 14px; }
    .upload-zone span { color: #0070c0; font-weight: 500; }
    #preview {
      display: none;
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      border-radius: 10px;
      margin-bottom: 20px;
      border: 1px solid #eee;
    }
    .btn {
      width: 100%;
      padding: 14px;
      background: #0070c0;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover { background: #005a9e; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }
    #loading {
      display: none;
      text-align: center;
      color: #666;
      margin-top: 20px;
      font-size: 14px;
    }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid #ddd;
      border-top-color: #0070c0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #result-box {
      display: none;
      margin-top: 24px;
      padding: 20px;
      border-radius: 12px;
      border: 2px solid #ddd;
    }
    #result-label {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
      text-align: center;
    }
    .bar-container {
      background: #eee;
      border-radius: 6px;
      height: 22px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    #result-bar {
      height: 22px;
      border-radius: 6px;
      width: 0%;
      transition: width 0.6s ease;
    }
    #result-score {
      text-align: center;
      color: #444;
      font-size: 15px;
      margin-top: 6px;
    }
    .all-scores {
      margin-top: 16px;
      border-top: 1px solid #eee;
      padding-top: 14px;
    }
    .score-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Détecteur de Masque Facial</h1>
    <p class="subtitle">Uploadez une photo pour analyser le port du masque</p>

    <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
      <div class="upload-icon">📷</div>
      <p><span>Cliquez pour choisir</span> ou glissez une image</p>
      <p style="margin-top:6px;font-size:12px;">PNG, JPG acceptés</p>
      <input type="file" id="fileInput" accept="image/*">
    </div>

    <img id="preview" alt="Aperçu de l'image">

    <button class="btn" id="btnAnalyser" disabled>Analyser</button>

    <div id="loading">
      <span class="spinner"></span> Analyse en cours...
    </div>

    <div id="result-box">
      <div id="result-label"></div>
      <div class="bar-container">
        <div id="result-bar"></div>
      </div>
      <div id="result-score"></div>
      <div class="all-scores" id="all-scores"></div>
    </div>
  </div>

  <script>
    const API_URL = 'https://fatoubintou2-mask-detector.hf.space/predict';
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const btn = document.getElementById('btnAnalyser');

    // Aperçu de l'image sélectionnée
    fileInput.addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        preview.src = e.target.result;
        preview.style.display = 'block';
        btn.disabled = false;
      };
      reader.readAsDataURL(file);
    });

    // Analyser
    btn.addEventListener('click', async function() {
      document.getElementById('loading').style.display = 'block';
      document.getElementById('result-box').style.display = 'none';
      btn.disabled = true;

      const reader = new FileReader();
      reader.onload = async function(e) {
        const base64Image = e.target.result;
        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: base64Image })
          });

          const result = await response.json();
          const predictions = result.confidences;
          const top = predictions.reduce((a, b) =>
            a.confidence > b.confidence ? a : b);

          let color = '#FFA500';
          if (top.label === 'Masque détecté') color = '#28a745';
          if (top.label === 'Sans masque') color = '#dc3545';

          const score = Math.round(top.confidence * 100);
          document.getElementById('result-label').textContent = top.label;
          document.getElementById('result-label').style.color = color;
          document.getElementById('result-bar').style.width = score + '%';
          document.getElementById('result-bar').style.background = color;
          document.getElementById('result-score').textContent = 'Confiance : ' + score + '%';
          document.getElementById('result-box').style.borderColor = color;
          document.getElementById('result-box').style.display = 'block';

          // Afficher tous les scores
          const allScores = document.getElementById('all-scores');
          allScores.innerHTML = predictions.map(p =>
            `<div class="score-row">
              <span>${p.label}</span>
              <span>${Math.round(p.confidence * 100)}%</span>
            </div>`
          ).join('');

        } catch (error) {
          alert('Erreur : ' + error.message);
        } finally {
          document.getElementById('loading').style.display = 'none';
          btn.disabled = false;
        }
      };
      reader.readAsDataURL(fileInput.files[0]);
    });
  </script>
</body>
</html>
